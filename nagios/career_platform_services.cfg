# Define Host for AI Career Platform
define host {
    use                     linux-server
    host_name               career-platform
    alias                   AI Career Platform Hosted Instance
    address                 frontend-xi-eight-13.vercel.app
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# Monitor Frontend HTTP Web Service (Port 80/443)
define service {
    use                     generic-service
    host_name               career-platform
    service_description     Frontend Web UI
    check_command           check_http!-S -u /
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# Monitor Backend API Endpoint Health (Port 8000 /health)
define service {
    use                     generic-service
    host_name               career-platform
    service_description     FastAPI Backend Health
    check_command           check_http!-S -u /_/backend/health -p 443 -s '{"status":"healthy"}'
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# Monitor Database Port Check (Port 5432)
define service {
    use                     generic-service
    host_name               career-platform
    service_description     PostgreSQL Database Port
    check_command           check_tcp!5432
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
